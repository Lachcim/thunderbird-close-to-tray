<!DOCTYPE html>
<html>
    <head>
        <title>Options - Close to Tray</title>

        <link rel="stylesheet" href="options.css">
        <script src="options.js"></script>
    </head>
    <body>
        <input type="checkbox" id="start-in-tray">
        <label for="start-in-tray">When Thunderbird is launched, move it to the tray</label>
        <div class="sunset">
            <p>This extension is inactive. You may control close to tray behavior via the following native settings:</p>
            <ul>
                <li>When Thunderbird is closed, move it to the tray</li>
                <ul>
                    <li>Start Thunderbird in the tray</li>
                </ul>
            </ul>
            <p>You may now uninstall Close to Tray.</p>
        </div>
    </body>
</html>
